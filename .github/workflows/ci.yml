name: quality-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: "1.25.11"

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Reject whitespace errors
        run: git diff --check
      - name: Verify Go formatting
        run: |
          files="$(gofmt -l $(git ls-files '*.go' ':!:node_modules/*'))"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Verify Go modules
        run: go mod verify
      - name: Reject generated leftovers
        run: |
          test -z "$(find . -maxdepth 3 -type d -empty -not -path './.git/*' -not -path './node_modules/*' -print)"
          test -z "$(git ls-files | grep -E '(^dev$|\.patch$|\.xlsx$|\.key$|\.pem$|service.*account.*json$)')" || {
            echo "Tracked generated or secret-like file found";
            git ls-files | grep -E '(^dev$|\.patch$|\.xlsx$|\.key$|\.pem$|service.*account.*json$)';
            exit 1;
          }

  backend:
    name: backend checks
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Vet
        run: go vet $(go list ./... | grep -v /node_modules/)
      - name: Test with race detector
        run: go test -race $(go list ./... | grep -v /node_modules/)
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./api ./cmd/dev ./pkg/app

  frontend:
    name: frontend checks
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Dependency audit
        run: npm audit --audit-level=high

  quality-gate:
    name: required quality gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Require all checks
        run: |
          test "${{ needs.backend.result }}" = "success"
          test "${{ needs.frontend.result }}" = "success"
