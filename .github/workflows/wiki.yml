name: sync-wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - .github/workflows/wiki.yml

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: sync GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs/wiki to GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN || secrets.GITHUB_TOKEN }}
          WIKI_URL: https://github.com/${{ github.repository }}.wiki.git
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          wiki_remote_url="https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if git clone "${wiki_remote_url}" "${tmp}"; then
            echo "Wiki repository cloned."
          else
            echo "::notice::${WIKI_URL} is empty or unavailable. Initializing a new wiki checkout."
            git init "${tmp}"
            git -C "${tmp}" remote add origin "${wiki_remote_url}"
          fi

          find "${tmp}" -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          cp -R docs/wiki/. "${tmp}/"

          git -C "${tmp}" config user.name "github-actions[bot]"
          git -C "${tmp}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${tmp}" add .

          if git -C "${tmp}" diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi

          git -C "${tmp}" commit -m "Sync wiki"
          git -C "${tmp}" branch -M master
          if git -C "${tmp}" push origin master; then
            echo "Wiki synced."
          else
            echo "::warning::Could not push to ${WIKI_URL}. If this is the first wiki sync, create one page in the GitHub Wiki UI or add a WIKI_TOKEN secret with repository write access, then rerun this workflow."
          fi
